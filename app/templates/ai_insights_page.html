{% extends "base_app.html" %}
{% load static %}

{% block app_content %}
<!-- ───── Header ───── -->
<div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 animate-pop-in">
    <div>
        <div class="flex items-center gap-4 mb-3">
            <a href="{% url 'dashboard' %}" class="w-10 h-10 rounded-full bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 flex items-center justify-center text-stone-800 dark:text-stone-400 hover:text-stone-950 dark:text-stone-100 hover:bg-stone-100 dark:bg-stone-800 transition-colors shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h1 class="text-3xl font-bold text-stone-950 dark:text-stone-100 tracking-tight">{{ file.custom_name|default:file.original_filename }}</h1>
            <span class="text-xs font-bold px-3 py-1 rounded-full bg-orange-500/20 border border-orange-500/30 text-orange-400 uppercase tracking-wider">{{ file.file_type }}</span>
        </div>
        <div class="flex flex-wrap items-center gap-3 sm:gap-6 ml-0 md:ml-14 mt-4 md:mt-0">
            <p class="text-sm font-medium text-stone-800 dark:text-stone-400 flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                {{ file.uploaded_at|date:"M d, Y" }}
            </p>
            <div class="hidden sm:block h-4 w-px bg-stone-100 dark:bg-stone-800"></div>
            <p class="text-sm font-medium text-stone-800 dark:text-stone-400"><span class="text-stone-950 dark:text-stone-100 font-bold">{{ file.row_count }}</span> rows</p>
            <div class="hidden sm:block h-4 w-px bg-stone-100 dark:bg-stone-800"></div>
            <p class="text-sm font-medium text-stone-800 dark:text-stone-400"><span class="text-stone-950 dark:text-stone-100 font-bold">{{ file.column_count }}</span> columns</p>
        </div>
    </div>
</div>

<!-- ───── AI Insights Panel ───── -->
<div id="aiInsightsPanel" class="hidden glass-panel rounded-2xl p-6 mb-8 shadow-xl opacity-0 animate-pop-in relative overflow-hidden" style="animation-delay:200ms;">
    <div class="absolute top-0 left-0 w-[350px] h-[350px] bg-sky-500/5 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="flex items-center gap-3 mb-5 relative z-10">
        <div class="p-2 rounded-xl bg-sky-500/20 text-sky-400 border border-sky-500/20">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
        </div>
        <h2 class="text-lg font-bold text-stone-950 dark:text-stone-100 tracking-tight">AI Insights</h2>
        <span id="insightsCount" class="ml-2 px-2 py-0.5 rounded-full bg-sky-500/20 text-xs font-bold text-sky-400 border border-sky-500/20"></span>
    </div>
    <div id="aiInsightsContainer" class="space-y-3 relative z-10">
        <!-- Populated by JS -->
    </div>
</div>

<!-- ───── Data Payload ───── -->
<script>
    window.APP_DATA = window.APP_DATA || {};
    window.APP_DATA.columns = JSON.parse('{{ columns_json|escapejs }}');
    window.APP_DATA.uniqueColumns = JSON.parse('{{ unique_columns_json|escapejs|default:"[]" }}');
        window.APP_DATA.FILE_ID = {{ file_id }};
    window.APP_DATA.CHART_DATA_URL = `/dataset//chart-data/`;
    window.APP_DATA.ADVANCED_STATS_URL = `/dataset//advanced-stats/`;
    window.APP_DATA.healthReport = JSON.parse('{{ health_report_json|escapejs|default:"{}" }}');
    window.APP_DATA.qualityScore = {{ quality_score|default:100 }};
    window.APP_DATA.cleaningActions = JSON.parse('{{ cleaning_actions_json|escapejs|default:"[]" }}');
    window.APP_DATA.beforeAfter = JSON.parse('{{ before_after_json|escapejs|default:"{}" }}');
    window.APP_DATA.aiInsights = JSON.parse('{{ ai_insights_json|escapejs|default:"[]" }}');
    window.APP_DATA.rawSnapshot = JSON.parse('{{ raw_snapshot_json|escapejs|default:"[]" }}');
    window.APP_DATA.rawColumns = JSON.parse('{{ raw_columns_json|escapejs|default:"[]" }}');
    window.APP_DATA.cellAnnotations = JSON.parse('{{ cell_annotations_json|escapejs|default:"{}" }}');
    window.APP_DATA.cleaningOptions = JSON.parse('{{ cleaning_options_json|escapejs|default:"{}" }}');

    </script>



<script src="{% static 'js/shared.js' %}"></script>



<script>
document.addEventListener('DOMContentLoaded', () => {
    const pnl = document.getElementById('aiInsightsPanel');
    const cnt = document.getElementById('aiInsightsContainer');
    const badge = document.getElementById('insightsCount');
    
    if (aiInsights && aiInsights.length > 0 && pnl && cnt) {
        pnl.classList.remove('hidden');
        badge.textContent = aiInsights.length;
        
        cnt.innerHTML = aiInsights.map(insight => {
            let clrClass = 'bg-stone-100 dark:bg-stone-800/50 border-stone-300 dark:border-stone-700 text-stone-900 dark:text-stone-300';
            let iconClr = 'text-stone-800 dark:text-stone-400';
            if (insight.type === 'warning') {
                clrClass = 'bg-amber-500/10 border-amber-500/20 text-amber-200';
                iconClr = 'text-amber-500';
            } else if (insight.type === 'suggestion') {
                clrClass = 'bg-emerald-500/10 border-emerald-500/20 text-emerald-200';
                iconClr = 'text-emerald-500';
            } else if (insight.type === 'info') {
                clrClass = 'bg-sky-500/10 border-sky-500/20 text-sky-200';
                iconClr = 'text-sky-500';
            }
            
            const confStr = insight.confidence ? `<span class="text-xs opacity-50 ml-auto">Conf: ${Math.round(insight.confidence*100)}%</span>` : '';
            
            return `
                <div class="rounded-xl p-4 border flex gap-3 items-start ${clrClass} hover:bg-stone-100 dark:bg-stone-800 transition-colors">
                    <div class="text-xl ${iconClr} mt-0.5">${insight.icon || '💡'}</div>
                    <div class="flex-1">
                        <div class="flex items-center">
                            <h3 class="font-bold text-sm tracking-wide uppercase opacity-80">${insight.title}</h3>
                            ${confStr}
                        </div>
                        <p class="text-sm mt-1 opacity-90 leading-relaxed">${insight.description}</p>
                    </div>
                </div>
            `;
        }).join('');
    }
});
</script>

{% endblock %}
